<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Keyzzilla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --text-color: #f1f1f1;
            --primary: #ff0055;
            --secondary: #00eaff;
            --font-retro: 'Press Start 2P', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('/assets/bliss.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: var(--font-retro);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* CRT Overlay Effect */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 9999;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 4px solid #fff;
            padding: 3rem;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3), 10px 10px 0 var(--primary);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 2rem;
            text-shadow: 4px 4px 0px #000;
        }

        p {
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            color: var(--secondary);
        }

        .countdown {
            font-size: 2rem;
            color: #fff;
            margin: 2rem 0;
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border: 2px dashed var(--secondary);
        }

        .loader {
            width: 100%;
            height: 10px;
            background: #222;
            border: 2px solid #fff;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 1s linear;
        }

        .back-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            margin-top: 2rem;
            display: inline-block;
            border-bottom: 2px solid transparent;
            transition: border-bottom 0.2s;
        }

        .back-link:hover {
            border-bottom: 2px solid var(--secondary);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 1.5rem; width: 90%; }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="container">
        <h1>404</h1>
        <p>SYSTEM ERROR: PAGE NOT FOUND</p>
        <div class="countdown" id="timer">5</div>
        <p>REDIRECTING TO HOMEBASE...</p>
        <div class="loader">
            <div class="loader-fill" id="loader-fill"></div>
        </div>
        <a href="https://keyzzilla.com" class="back-link">OR CLICK HERE TO RETURN MANUALLY</a>
    </div>

    <script>
        let count = 5;
        const timerElement = document.getElementById('timer');
        const loaderFill = document.getElementById('loader-fill');
        
        const countdown = setInterval(() => {
            count--;
            timerElement.textContent = count;
            loaderFill.style.width = ((5 - count) / 5 * 100) + '%';
            
            if (count <= 0) {
                clearInterval(countdown);
                window.location.href = 'https://keyzzilla.com';
            }
        }, 1000);

        // Initial fill
        setTimeout(() => {
            loaderFill.style.width = '0%';
        }, 10);
    </script>
</body>
</html>
