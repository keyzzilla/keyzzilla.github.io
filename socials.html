<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>socials — keyzzilla</title>
    <meta name="description" content="connect with keyzzilla across social platforms.">
    <link rel="stylesheet" href="style.css">
    <style>
        .socials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .social-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.3s ease;
            height: 600px;
        }

        .social-card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .social-icon {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .social-name {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .embed-container {
            flex: 1;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .twitter-container {
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .socials-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .social-card {
                height: 500px;
            }
        }
    </style>
</head>

<body>

    <canvas id="particle-canvas"></canvas>

    <nav class="navbar">
        <a href="index.html" class="nav-logo" style="display: flex; align-items: center;"><img src="assets/keyzz.gif"
                alt="keyzzilla logo" style="height: 30px; object-fit: contain;"></a>
        <ul class="nav-links">
            <li><a href="index.html">home</a></li>
            <li><a href="about.html">about</a></li>
            <li><a href="setup.html">setup</a></li>
            <li><a href="timeline.html">timeline</a></li>
            <li><a href="friends.html">friends</a></li>
            <li><a href="socials.html" class="active">socials</a></li>
            <li><a href="contact.html">contact</a></li>
        </ul>
        <button class="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="page">
        <div class="section">
            <header style="text-align: center; margin-bottom: 4rem;" class="reveal">
                <p class="section-tag">//&nbsp;digital_presence</p>
                <h1 class="section-title">social feeds</h1>
                <p class="section-subtitle">live updates from across the network.</p>
            </header>

            <div class="socials-grid reveal">
                <!-- Twitch -->
                <div class="social-card">
                    <div class="card-header">
                        <span class="social-name">twitch // keyzzvv</span>
                    </div>
                    <div class="embed-container">
                        <iframe src="https://player.twitch.tv/?channel=keyzzvv&parent=keyzzilla.com&autoplay=false"
                            allowfullscreen="true"></iframe>
                    </div>
                </div>

                <!-- YouTube -->
                <div class="social-card">
                    <div class="card-header">
                        <span class="social-name">youtube // @keyzzilla</span>
                    </div>
                    <div class="embed-container">
                        <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=@keyzzilla"
                            allowfullscreen="true"></iframe>
                    </div>
                </div>

                <!-- Twitter / X -->
                <div class="social-card">
                    <div class="card-header">
                        <span class="social-name">twitter // @keyzzxvz</span>
                    </div>
                    <div class="embed-container twitter-container">
                        <a class="twitter-timeline" data-theme="dark" data-tweet-limit="1"
                            data-chrome="noheader nofooter noborders transparent"
                            href="https://twitter.com/keyzzxvz?ref_src=twsrc%5Etfw">tweets by @keyzzxvz</a>
                        <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            crafted with <span>♥</span> by keyzzilla &nbsp;·&nbsp; <span>2026</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
